<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>谁是第一名 - 主持权争夺战</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- Toast 通知容器 -->
  <div id="toast-container"></div>

  <!-- ====== 视图 1：等待区 ====== -->
  <div id="waiting-view" class="view active">
    <div class="container">
      <header class="header">
        <h1 class="title neon-text">谁是第一名</h1>
        <p class="subtitle" id="room-title">第 ? 周 主持权争夺战</p>
      </header>

      <div class="join-section">
        <div class="input-group">
          <input
            type="text"
            id="name-input"
            class="name-input"
            placeholder="输入你的大名..."
            maxlength="12"
            autocomplete="off"
          >
          <button id="join-btn" class="btn btn-primary glow-btn">
            <span>加入战场</span>
          </button>
        </div>
      </div>

      <div class="player-list-section">
        <h2 class="section-title">
          <span class="icon">⚔️</span> 战场名单 <span id="player-count" class="count-badge">0</span>
        </h2>
        <div id="player-list" class="player-list">
          <p class="empty-hint">虚位以待，等你登场...</p>
        </div>
      </div>

      <div id="owner-actions" class="owner-actions" style="display:none;">
        <button id="start-btn" class="btn btn-primary btn-large glow-btn-pulse">
          🚀 全军出击
        </button>
        <p class="owner-hint">你是房主，准备好就可以开始！</p>
      </div>
    </div>
  </div>

  <!-- ====== 视图 2：游戏区 ====== -->
  <div id="game-view" class="view">
    <div class="game-container">
      <div id="countdown-display" class="countdown-display">10</div>
      <p class="countdown-label" id="countdown-label">准备...</p>

      <div id="click-area" class="click-area" style="display:none;">
        <div class="click-score" id="click-score-display">0</div>
        <button id="click-btn" class="click-button">
          <span class="click-icon">⚡</span>
          <span>点击蓄力</span>
          <span class="click-icon">⚡</span>
        </button>
        <p class="click-hint">疯狂点击！每次+1分</p>
      </div>

      <div id="buff-reveal" class="buff-reveal" style="display:none;">
        <div class="buff-card" id="buff-card">
          <div class="buff-icon" id="buff-icon"></div>
          <div class="buff-name" id="buff-name"></div>
          <div class="buff-desc" id="buff-desc"></div>
          <div class="buff-score" id="buff-score"></div>
        </div>
        <p class="waiting-text" id="waiting-others">等待其他选手结算...</p>
      </div>
    </div>
  </div>

  <!-- ====== 视图 3：结果页 ====== -->
  <div id="result-view" class="view">
    <div class="result-container">
      <header class="result-header">
        <h1 class="result-title neon-text-red">排行已定！</h1>
        <div class="loser-announce" id="loser-announce">
          <span class="loser-icon">🎤</span>
          <span class="loser-text">下周会议由 <strong id="loser-name"></strong> 主持！</span>
        </div>
        <p class="loser-sub">（反向激励：垫底"光荣"）</p>
      </header>

      <div class="ranking-list" id="ranking-list">
        <!-- 动态生成排行 -->
      </div>

      <div id="owner-reset" class="owner-reset" style="display:none;">
        <button id="reset-btn" class="btn btn-primary btn-large glow-btn-pulse">
          🔄 开启新一轮
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
