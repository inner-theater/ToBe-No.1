<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>谁是第一名 - 主持权争夺战</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <div id="toast-container"></div>

  <!-- ====== 视图 0：个人资料 ====== -->
  <div id="profile-view" class="view active">
    <div class="profile-modal">
      <h1 class="neon-text profile-title">欢迎回到 谁是第一名</h1>
      <p class="profile-sub" id="profile-sub">输入你的昵称</p>

      <div class="avatar-section" id="avatar-section" style="display:none">
        <div class="avatar-preview" id="avatar-preview">
          <span class="avatar-placeholder">+</span>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none">
        <p class="avatar-hint">点击头像上传</p>
      </div>

      <div class="nickname-section">
        <input type="text" id="nickname-input" class="nickname-input" placeholder="输入你的昵称" maxlength="10" autocomplete="off">
        <p class="nickname-counter"><span id="nickname-count">0</span>/10</p>
      </div>

      <button id="profile-save-btn" class="btn btn-primary glow-btn" disabled>进入大厅</button>
    </div>
  </div>

  <!-- ====== 视图 1：活动大厅 ====== -->
  <div id="lobby-view" class="view">
    <div class="lobby-container">
      <!-- 顶部栏 -->
      <header class="lobby-header">
        <button id="history-btn" class="btn btn-small btn-secondary" style="position:absolute;left:0">📋 历史</button>
        <h1 class="lobby-title neon-text">活动大厅</h1>
        <div style="position:absolute;right:0;display:flex;gap:8px">
          <button id="create-room-btn" class="btn btn-small btn-primary">创建房间</button>
          <button id="logout-btn" class="btn btn-small btn-secondary">退出</button>
        </div>
      </header>

      <!-- 主体：用户游走区 + 右侧房间面板 -->
      <div class="lobby-main">
        <div class="lobby-stage" id="lobby-stage">
          <!-- 动态渲染在线用户漂浮头像 -->
        </div>

        <!-- 房间面板 -->
        <aside class="room-panel" id="room-panel">
          <h3 class="room-panel-title">对战场</h3>
          <div class="room-list" id="room-list">
            <p class="empty-hint">暂无房间，创建一个吧</p>
          </div>
          <div id="room-create-form" class="room-create-form" style="display:none">
            <input type="text" id="room-name-input" class="room-name-input" placeholder="房间名（如：产品组对决）" maxlength="12">
            <button id="room-create-confirm" class="btn btn-primary btn-small">创建</button>
          </div>
        </aside>
      </div>

      <!-- 底部弹幕区 -->
      <div class="lobby-bottom">
        <div class="barrage-layer" id="barrage-layer"></div>
        <div class="comment-bar">
          <input type="text" id="comment-input" class="comment-input" placeholder="发条弹幕..." maxlength="30">
          <button id="comment-send-btn" class="btn btn-small btn-primary">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 视图 2：等待区 ====== -->
  <div id="waiting-view" class="view">
    <div class="container">
      <header class="header">
        <h1 class="title neon-text" id="waiting-room-title">对战场</h1>
        <p class="subtitle" id="room-subtitle">等待房主开始...</p>
      </header>
      <div class="player-list-section">
        <h2 class="section-title"><span class="icon">⚔️</span> 参赛名单 <span id="player-count" class="count-badge">0</span></h2>
        <div id="player-list" class="player-list"></div>
      </div>
      <div id="owner-actions" class="owner-actions" style="display:none">
        <button id="start-btn" class="btn btn-primary btn-large glow-btn-pulse">🚀 全军出击</button>
        <p class="owner-hint">你是房主，准备好就可以开始！</p>
      </div>
      <button id="leave-room-btn" class="btn btn-secondary btn-small" style="margin-top:12px">退出房间</button>
    </div>
  </div>

  <!-- ====== 视图 3：游戏区 ====== -->
  <div id="game-view" class="view">
    <div class="game-container">
      <div id="countdown-display" class="countdown-display">10</div>
      <p class="countdown-label" id="countdown-label">准备...</p>
      <div id="click-area" class="click-area" style="display:none">
        <div class="click-score" id="click-score-display">0</div>
        <button id="click-btn" class="click-button">
          <span class="click-icon">⚡</span><span>点击蓄力</span><span class="click-icon">⚡</span>
        </button>
        <p class="click-hint">疯狂点击！每次+1分</p>
      </div>
      <div id="buff-reveal" class="buff-reveal" style="display:none">
        <div class="buff-card" id="buff-card">
          <div class="buff-icon" id="buff-icon"></div>
          <div class="buff-name" id="buff-name"></div>
          <div class="buff-desc" id="buff-desc"></div>
          <div class="buff-score" id="buff-score"></div>
        </div>
        <p class="waiting-text" id="waiting-others">等待其他选手结算...</p>
      </div>
    </div>
  </div>

  <!-- ====== 视图 4：结果页 ====== -->
  <div id="result-view" class="view">
    <div class="result-container">
      <header class="result-header">
        <h1 class="result-title neon-text-red">排行已定！</h1>
        <div class="loser-announce" id="loser-announce">
          <span class="loser-icon">🎤</span>
          <span class="loser-text">下周会议由 <strong id="loser-name"></strong> 主持！</span>
        </div>
        <p class="loser-sub">（反向激励：垫底"光荣"）</p>
      </header>
      <div class="ranking-list" id="ranking-list"></div>
      <div id="owner-reset" class="owner-reset" style="display:none">
        <button id="reset-btn" class="btn btn-primary btn-large glow-btn-pulse">🔄 开启新一轮</button>
      </div>
      <button id="back-to-lobby-btn" class="btn btn-secondary btn-small" style="margin-top:12px">返回大厅</button>
    </div>
  </div>

  <!-- 道具投掷弹窗 -->
  <div id="item-popup" class="item-popup" style="display:none">
    <div class="item-popup-content">
      <p class="item-popup-title">向 <span id="item-target-name"></span> 扔个</p>
      <div class="item-popup-options">
        <button class="item-option" data-item="tomato">🍅</button>
        <button class="item-option" data-item="egg">🥚</button>
        <button class="item-option" data-item="broccoli">🥦</button>
        <button class="item-option" data-item="drumstick">🍗</button>
        <button class="item-option" data-item="bomb">💣</button>
        <button class="item-option" data-item="rocket">🚀</button>
        <button class="item-option" data-item="666">6️⃣6️⃣6️⃣</button>
        <button class="item-option" data-item="poop">💩</button>
      </div>
      <button class="item-popup-close" id="item-popup-close">取消</button>
    </div>
  </div>

  <!-- 历史记录弹窗 -->
  <div id="history-modal" class="item-popup" style="display:none">
    <div class="history-modal-content">
      <h2 class="neon-text" style="font-size:1.2rem;margin-bottom:16px">📋 对战历史</h2>
      <div class="history-list" id="history-list">
        <p class="empty-hint">暂无记录</p>
      </div>
      <button class="btn btn-secondary btn-small" id="history-close" style="margin-top:12px">关闭</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
